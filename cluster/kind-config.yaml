kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: moto-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 31573
        hostPort: 31573
        protocol: TCP
  - role: worker
    labels:
      workload: apps
  - role: worker
    labels:
      workload: platform
