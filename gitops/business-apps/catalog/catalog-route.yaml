apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-route
  namespace: moto-catalog # Vive en el namespace de la app
spec:
  parentRefs:
    - name: moto-lab-gateway
      namespace: envoy-gateway-system # Apunta al peaje central
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /catalog
      backendRefs:
        - name: catalog-service
          port: 80 # El puerto ClusterIP de la app
