apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-dashboard-sa
  namespace: platform-tools
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-dashboard-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-dashboard-reader-binding
subjects:
  - kind: ServiceAccount
    name: cluster-dashboard-sa
    namespace: platform-tools
roleRef:
  kind: ClusterRole
  name: cluster-dashboard-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: platform-tools
  labels:
    app: cluster-dashboard
stream: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
    spec:
      serviceAccountName: cluster-dashboard-sa
      containers:
        - name: dashboard
          image: crisfiori/cluster-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-dashboard-svc
  namespace: platform-tools
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: cluster-dashboard
  type: ClusterIP
