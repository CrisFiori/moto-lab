apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cluster-dashboard-route
  namespace: platform-tools
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`dashboard.moto-lab.local`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: cluster-dashboard-svc
          port: 8080
