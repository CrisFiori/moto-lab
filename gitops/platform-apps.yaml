apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "https://github.com/CrisFiori/moto-lab.git"
    targetRevision: HEAD
    path: gitops/platform-tools # <- Apunta a la carpeta donde están el RBAC y el Deployment
    directory:
      recurse: true # <- Activamos recursividad desde el inicio para evitar el error anterior!
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
