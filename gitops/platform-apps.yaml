# gitops/platform-apps.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/CrisFiori/moto-lab.git"
    targetRevision: HEAD
    path: gitops/platform-tools
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: platform-tools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
