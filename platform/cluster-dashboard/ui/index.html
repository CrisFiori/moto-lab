<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto-Lab Cluster Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

    <header class="border-b border-gray-800 bg-gray-900 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🏍️</span>
            <h1 class="text-xl font-bold tracking-tight text-amber-500">Moto-Lab Platform Dashboard</h1>
        </div>
        <div class="flex items-center gap-4 text-sm text-gray-400">
            <div>K8s Versión: <span id="k8s-version" class="text-emerald-400 font-mono font-bold">Cargando...</span>
            </div>
            <div>Nodos Totales: <span id="total-nodes" class="text-amber-400 font-bold">0</span></div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <h2 class="text-lg font-semibold text-gray-400 mb-4">Estado de los Nodos del Clúster (Kind)</h2>

        <div id="nodes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500 font-mono">
                Consultando al API Server...
            </div>
        </div>

        <h2 class="text-lg font-semibold text-gray-400 mb-4 mt-10">Estado de las Applications (ArgoCD)</h2>

        <div id="argo-apps-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500 font-mono">
                Consultando a ArgoCD...
            </div>
        </div>
    </main>

    <script>
        async function cargarArgoApps() {
            try {
                const res = await fetch('/api/v1/argo-apps');
                if (!res.ok) throw new Error('Error al conectar con la API de ArgoCD Apps');
                const apps = await res.json();

                const contenedor = document.getElementById('argo-apps-container');
                contenedor.innerHTML = '';

                if (!apps || apps.length === 0) {
                    contenedor.innerHTML = `
                        <div class="col-span-full text-center py-12 text-gray-500 font-mono">
                            No se encontraron Applications.
                        </div>
                    `;
                    return;
                }

                apps.forEach(app => {
                    const healthColor = app.health === 'Healthy'
                        ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'
                        : app.health === 'Progressing'
                            ? 'bg-amber-500/10 text-amber-400 border-amber-500/20'
                            : 'bg-rose-500/10 text-rose-400 border-rose-500/20';

                    const syncColor = app.sync === 'Synced'
                        ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'
                        : 'bg-rose-500/10 text-rose-400 border-rose-500/20';

                    contenedor.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <h3 class="text-md font-bold text-gray-200 truncate max-w-[180px]">${app.name}</h3>
                                    <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${healthColor}">
                                        ${app.health}
                                    </span>
                                </div>
                                <div class="space-y-2 text-sm text-gray-400">
                                    <div class="flex justify-between border-b border-gray-800/50 pb-1">
                                        <span>Sync Status:</span>
                                        <span class="px-2 py-0.2 rounded text-xs border ${syncColor}">${app.sync}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                document.getElementById('argo-apps-container').innerHTML = `
                    <div class="col-span-full bg-rose-500/5 border border-rose-500/10 text-rose-400 p-4 rounded-xl text-center font-mono">
                        💥 Error al cargar Applications: ${error.message}
                    </div>
                `;
            }
        }

        async function fetchClusterData() {
            try {
                // Le pega al endpoint relativo que expone nuestro binario de Go
                const response = await fetch('/api/v1/cluster-info');
                if (!response.ok) throw new Error('Error al conectar con la API de Go');
                const data = await response.json();

                // Actualizar Header
                document.getElementById('k8s-version').innerText = data.k8sVersion;
                document.getElementById('total-nodes').innerText = data.totalNodes;

                // Renderizar Tarjetas de Nodos
                const container = document.getElementById('nodes-container');
                container.innerHTML = ''; // Limpiar loader

                data.nodes.forEach(node => {
                    const statusColor = node.status === 'Ready' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20';
                    const roleColor = node.role === 'control-plane' ? 'bg-purple-500/10 text-purple-400 border-purple-500/20' : 'bg-blue-500/10 text-blue-400 border-blue-500/20';

                    container.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <h3 class="text-md font-bold text-gray-200 truncate max-w-[180px]">${node.name}</h3>
                                    <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${statusColor}">
                                        ${node.status}
                                    </span>
                                </div>
                                <div class="space-y-2 text-sm text-gray-400">
                                    <div class="flex justify-between border-b border-gray-800/50 pb-1">
                                        <span>Rol:</span>
                                        <span class="px-2 py-0.2 rounded text-xs border ${roleColor}">${node.role}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-gray-800/50 pb-1">
                                        <span>CPUs Disponibles:</span>
                                        <span class="font-mono text-gray-200">${node.cpu}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-gray-800/50 pb-1">
                                        <span>Memoria Total:</span>
                                        <span class="font-mono text-gray-200">${node.memory}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4 pt-3 border-t border-gray-800 text-xs text-gray-500 font-mono flex justify-between">
                                <span>Runtime:</span>
                                <span class="text-gray-400">${node.containerRuntime}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                console.error(error);
                document.getElementById('nodes-container').innerHTML = `
                    <div class="col-span-full bg-rose-500/5 border border-rose-500/10 text-rose-400 p-4 rounded-xl text-center font-mono">
                        💥 Error al cargar el Dashboard: ${error.message}
                    </div>
                `;
            }
        }

        // Ejecutar al cargar la página
        fetchClusterData();
        cargarArgoApps();
    </script>
</body>

</html>
